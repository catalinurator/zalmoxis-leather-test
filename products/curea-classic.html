<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curea Classic</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#f3e7db;
color:#2a1c16;
transition: background 0.3s, color 0.3s; /* Tranziție fină când se schimbă tema */
}

/* --- REGULI PENTRU DARK MODE --- */
html.dark-mode body {
    background: #121212; /* Fundal închis la culoare */
    color: #e0e0e0;      /* Text deschis la culoare */
}

html.dark-mode .desc {
    color: #b0a095;      /* Text descriere mai lizibil pe fundal negru */
}

html.dark-mode .btn {
    border-color: #c49a6c;
    color: #e0e0e0;
}

html.dark-mode .btn:hover {
    background: #c49a6c;
    color: #121212;
}
/* -------------------------------- */

.container{
max-width:1100px;
margin:100px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:20px;
}

img{
width:100%;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{font-size:34px;}

.price{font-size:22px;font-weight:600;margin:10px 0;}

.desc{color:#5a3a2e;line-height:1.5;}

.btn{
display:inline-block;
padding:14px 28px;
border:1px solid #9A6A3A;
background:transparent;
color:#2A211B;
text-decoration:none;
transition:.35s;
}

.btn:hover{
background:#9A6A3A;
color:white;
transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="container">

<div class="image-box">
<img id="productImg" src="../image/curea1.png" alt="Curea din piele naturală">
</div>

<div>
<h1>Curea clasica</h1>
<div class="price">299 MDL</div>

<div class="desc">
Curea din piele naturală, lucrată manual pentru rezistență și stil minimalist.
</div>

<a class="btn"
href="https://ig.me/m/zalmoxis_leather?text=Salut!%20Vreau%20sa%20comand%20curea"
target="_blank">
Comandă
</a>
</div>

</div>

<script>
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.documentElement.classList.add('dark-mode');
    }
</script>

</body>
</html>
