<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portofel Mașină - Zalmoxis Leather</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f3e7db;
color:#2a1c16;
}

.container{
max-width:1100px;
margin:100px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
padding:20px;
align-items:center;
}

/* IMAGE */
.image-box img{
width:100%;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
transition:0.3s;
}

.image-box img:hover{
transform:scale(1.02);
}

/* TEXT */
h1{
font-size:38px;
margin:0;
}

.price{
font-size:24px;
margin:15px 0;
font-weight:700;
color:#5a3a2e;
}

.desc{
color:#5a3a2e;
line-height:1.6;
margin-top:10px;
}

/* COLORS */
.colors{
margin-top:25px;
}

.color-btn{
display:inline-block;
padding:10px 16px;
border:1px solid #2a1c16;
border-radius:10px;
cursor:pointer;
margin-right:10px;
transition:0.3s;
font-size:14px;
}

.color-btn:hover{
background:#2a1c16;
color:#fff;
}

.color-btn.active{
background:#c49a6c;
border-color:#c49a6c;
color:#2a1c16;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:30px;
padding:14px 20px;
background:#2a1c16;
color:#fff;
text-decoration:none;
border-radius:12px;
font-weight:600;
transition:0.3s;
}

.btn:hover{
background:#c49a6c;
color:#2a1c16;
}

/* MOBILE */
@media(max-width:768px){
.container{
grid-template-columns:1fr;
text-align:center;
}
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="image-box">
<img id="productImg" src="image/portmoneu-masina.jpg" alt="Portofel piele naturală">
</div>

<!-- INFO -->
<div>

<h1>Portofel Mașină</h1>

<div class="price">549 MDL</div>

<div class="desc">
Portofel realizat manual din piele naturală full-grain.
Design minimalist, cusut manual pentru durabilitate maximă.
</div>

<!-- COLORS -->
<div class="colors">
<h3>Culori</h3>

<span class="color-btn active" onclick="changeColor(this,'black')">Negru</span>
<span class="color-btn" onclick="changeColor(this,'brown')">Maro</span>
<span class="color-btn" onclick="changeColor(this,'cognac')">Coniac</span>
</div>

<!-- BUTTON -->
<a class="btn"
href="https://ig.me/m/zalmoxis_leather?text=Salut!%20Vreau%20sa%20comand%20Portofel%20Masina"
target="_blank">
Comandă pe Instagram
</a>

</div>

</div>

<script>
function changeColor(el, color){

// reset active
document.querySelectorAll(".color-btn").forEach(b=>{
b.classList.remove("active");
});
el.classList.add("active");

let img = document.getElementById("productImg");

if(color === "black"){
img.src = "image/portmoneu-masina.jpg";
}

if(color === "brown"){
img.src = "image/portomeu-masina_cafeniu.jpg";
}

if(color === "cognac"){
img.src = "image/portmoneu-masina-cognac.jpg";
}
}
</script>

</body>
</html>
