<!DOCTYPE html>
<html lang="ro">
<head>

}

.container{
max-width:1100px;
margin:100px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:20px;
}

img{

border-radius:16px;

}

.price{font-size:22px;font-weight:600;margin:10px 0;}

.desc{color:#5a3a2e;line-height:1.5;}

.btn{

padding:14px 28px;

border:1px solid #9A6A3A;

background:transparent;

color:#2A211B;

text-decoration:none;

}

.btn:hover{

background:#9A6A3A;

color:white;

transform:translateY(-2px);

}
</style>
</head>

<body>

<div class="container">

<div>
