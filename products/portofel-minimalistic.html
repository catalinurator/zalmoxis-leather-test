<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofel Minimalist - Zalmoxis Leather</title>

    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3e7db;
            color: #2a1c16;
            transition: background 0.3s, color 0.3s; /* Schimbare fluidă de culori */
        }

        /* --- STILURI PENTRU DARK MODE --- */
        html.dark-mode body {
            background: #121212;
            color: #e0e0e0;
        }

        html.dark-mode .price {
            color: #c49a6c;
        }

        html.dark-mode .desc {
            color: #b0a095;
        }

        html.dark-mode .color-btn {
            border-color: #c49a6c;
            color: #e0e0e0;
        }

        html.dark-mode .color-btn:hover {
            background: #c49a6c;
            color: #121212;
        }

        html.dark-mode .color-btn.active {
            background: #c49a6c;
            border-color: #c49a6c;
            color: #121212;
        }

        html.dark-mode .btn {
            border-color: #c49a6c;
            color: #e0e0e0;
        }

        html.dark-mode .btn:hover {
            background: #c49a6c;
            color: #121212;
        }
        /* -------------------------------- */

        .container {
            max-width: 1100px;
            margin: 100px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 20px;
            align-items: center;
        }

        /* IMAGE */
        .image-box img {
            width: 100%;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .image-box img:hover {
            transform: scale(1.02);
        }

        /* TEXT */
        h1 {
            font-size: 38px;
            margin: 0;
        }

        .price {
            font-size: 24px;
            margin: 15px 0;
            font-weight: 700;
            color: #5a3a2e;
        }

        .desc {
            color: #5a3a2e;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* COLORS */
        .colors {
            margin-top: 25px;
        }

        .colors h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .color-btn {
            display: inline-block;
            padding: 10px 16px;
            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: .35s;
            margin-right: 5px;
        }
         
        .color-btn:hover {
            background: #9A6A3A;
            color: white;
            transform: translateY(-2px);
        }

        .color-btn.active {
            background: #c49a6c;
            border-color: #c49a6c;
            color: #2a1c16;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 14px 36px;
            margin-top: 20px; 
            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            transition: .35s;
        }

        .btn:hover {
            background: #9A6A3A;
            color: white;
            transform: translateY(-2px);
        }

        /* MOBILE */
        @media(max-width:768px){
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="image-box">
        <img id="productImg" src="../image/portmoneu1.jpg" alt="Portofel piele naturală">
    </div>

    <div>
        <h1>Portofel minimalist</h1>
        <div class="price">389 MDL</div>
        <div class="desc">
            Portofel realizat manual din piele naturală full-grain. Design minimalist, cusut manual pentru durabilitate maximă.
        </div>

        <div class="colors">
            <h3>Culori</h3>
            <button class="color-btn active" onclick="changeColor(this,'black')">Negru</button>
            <button class="color-btn" onclick="changeColor(this,'brown')">Maro</button>
            <button class="color-btn" onclick="changeColor(this,'cognac')">Coniac</button>
        </div>

        <a class="btn" href="https://ig.me/m/zalmoxis_leather?text=Salut!%20Vreau%20sa%20comand%20Portofel%20minimalist" target="_blank">
            Comandă
        </a>
    </div>

</div>

<script>
function changeColor(el, color){
    // Resetăm clasa active de pe toate butoanele
    document.querySelectorAll(".color-btn").forEach(b => {
        b.classList.remove("active");
    });
    el.classList.add("active");

    let img = document.getElementById("productImg");
    
    // Înlocuiește denumirile cu cele reale (de exemplu portmoneu1-maro.jpg) dacă ai poze diferite
    if(color === "black"){
        img.src = "../image/portmoneu1.jpg";
    }
    if(color === "brown"){ 
        img.src = "../image/portmoneu1.jpg";
    }
    if(color === "cognac"){
        img.src = "../image/portmoneu1.jpg";
    }
}

// Verifică starea temei la încărcarea paginii
if (localStorage.getItem('darkMode') === 'enabled') {
    document.documentElement.classList.add('dark-mode');
}
</script>

    <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Schimbă tema">
    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none; width:22px; height:22px;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.344l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
    </svg>
    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:22px; height:22px;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
</button>

<style>
.theme-toggle-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #2a1c16; /* Culoarea brandului tău */
    color: #f3e7db;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    z-index: 9999;
}

.theme-toggle-btn:hover {
    transform: scale(1.1) translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* Stil când site-ul e pe modul întunecat */
html.dark-mode .theme-toggle-btn {
    background: #f3e7db;
    color: #121212;
}
</style>

<script>
const btn = document.getElementById('themeToggleBtn');
const sunIcon = btn.querySelector('.sun-icon');
const moonIcon = btn.querySelector('.moon-icon');

function updateIcons(isDark) {
    if (isDark) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
    } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
    }
}

function setTheme(isDark) {
    if (isDark) {
        document.documentElement.classList.add('dark-mode');
        localStorage.setItem('darkMode', 'enabled');
    } else {
        document.documentElement.classList.remove('dark-mode');
        localStorage.setItem('darkMode', 'disabled');
    }
    updateIcons(isDark);
}

// 1. Verificare inițială (Manuală sau Automată bazată pe sistemul telefonului/PC-ului)
const savedTheme = localStorage.getItem('darkMode');
const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');

if (savedTheme === 'enabled') {
    setTheme(true);
} else if (savedTheme === 'disabled') {
    setTheme(false);
} else {
    // Dacă utilizatorul nu a setat manual nimic, verificăm automat setările sistemului lui
    setTheme(prefersDarkScheme.matches);
}

// 2. Schimbare manuală la click pe buton
btn.addEventListener('click', () => {
    const isCurrentlyDark = document.documentElement.classList.contains('dark-mode');
    setTheme(!isCurrentlyDark);
});

// 3. Ascultă dacă utilizatorul își schimbă setarea de sistem live în telefon
prefersDarkScheme.addEventListener('change', (e) => {
    if (!localStorage.getItem('darkMode')) { // Schimbă doar dacă utilizatorul nu a ales deja manual
        setTheme(e.matches);
    }
});
</script>
    
</body>
</html>
