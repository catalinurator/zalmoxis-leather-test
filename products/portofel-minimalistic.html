            background: #121212;
            color: #e0e0e0;

        html.dark-mode .price {
            color: #c49a6c;

        html.dark-mode .color-btn {

        }

            background: #c49a6c;

        }

        html.dark-mode .btn {

        .container {

            margin: 100px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 20px;
            align-items: center;

        /* IMAGE */

            border-radius: 18px;

            transition: 0.3s;

            margin: 0;
        }

            font-size: 24px;
            margin: 15px 0;
            font-weight: 700;
            color: #5a3a2e;
        }

        .desc {
            color: #5a3a2e;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* COLORS */
        .colors {
            margin-top: 25px;
        }

        .colors h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .color-btn {
            display: inline-block;
            padding: 10px 16px;
            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: .35s;
            margin-right: 5px;
        }

            color: white;

        }

            color: #2a1c16;

            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            transition: .35s;
        }

        .btn:hover {
            background: #9A6A3A;
            color: white;
            transform: translateY(-2px);
        }

        /* MOBILE */
        @media(max-width:768px){
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }
    </style>
</head>

<!-- STILURILE CSS (Adaugă-le în tag-ul tău <style>) -->
<style>
/* --- STIL HEADER ULTRA MINIMALIST --- */
.main-header {
    background: transparent; /* Perfect transparent, fără fundal alb/crem */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 10000;
}

.header-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: 700;
    text-decoration: none;
    color: #2a1c16;
    letter-spacing: 3px;
    transition: color 0.3s;
}
html.dark-mode .logo { color: #e0e0e0; }

/* --- HAMBURGER DISCRET ȘI SUBȚIRE --- */
.hamburger {
    display: block;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 8px;
    z-index: 10001;
}

.bar {
    display: block;
    width: 26px;
    height: 1.5px; /* Liniile hamburgerului sunt mai subțiri și elegante */
    margin: 6px auto;
    transition: all 0.3s ease-in-out;
    background-color: #2a1c16;
}
html.dark-mode .bar { background-color: #e0e0e0; }

.hamburger.active .bar:nth-child(2) { opacity: 0; }
.hamburger.active .bar:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
.hamburger.active .bar:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

/* --- MENIUL OVERLAY PREMIUM --- */
.nav-overlay {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    height: 100vh;
    background-color: #f3e7db; /* Fundal solid curat (fără transparență dubioasă) */
    z-index: 9999;
    transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); /* Animație mult mai fluidă */
    display: flex;
    align-items: center;
    justify-content: center;
}

html.dark-mode .nav-overlay {
    background-color: #121212; /* Fundal solid închis */
}

.nav-overlay.active {
    right: 0;
}

.nav-menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
}

.nav-menu a {
    text-decoration: none;
    color: #2a1c16;
    font-size: 26px; /* Text ușor mai mare, aerisit */
    font-weight: 400;
    letter-spacing: 1px;
    transition: color 0.3s, transform 0.2s;
}
html.dark-mode .nav-menu a { color: #e0e0e0; }
.nav-menu a:hover { 
    color: #9A6A3A;
}

/* Am înlocuit linia lată cu un spațiu gol discret */
.menu-spacer {
    height: 15px;
}

/* --- BUTONUL DE DARK MODE MINIMALIST --- */
.theme-toggle-inline {
    background: transparent;
    border: 1px solid rgba(154, 106, 58, 0.3); /* Bordură foarte fină */
    padding: 8px 18px;
    border-radius: 20px;
    color: #5a3a2e;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.3s;
}

html.dark-mode .theme-toggle-inline {
    border-color: rgba(196, 154, 108, 0.3);
    color: #b0a095;
}

.theme-toggle-inline:hover {
    border-color: #9A6A3A;
    color: #2a1c16;
}
html.dark-mode .theme-toggle-inline:hover {
    border-color: #c49a6c;
    color: #e0e0e0;
}

.theme-icons {
    display: flex;
    align-items: center;
}

/* Ajustare spațiu conținut */
.container {
    margin-top: 120px !important; 
}
</style>

<!-- SCRIPTUL JAVASCRIPT (Hamburger universal + Dark Mode) -->
<script>
// --- LOGICA DESCHIDERII MENIULUI ---
const hamburger = document.querySelector(".hamburger");
const navOverlay = document.querySelector(".nav-overlay");

hamburger.addEventListener("click", () => {
    hamburger.classList.toggle("active");
    navOverlay.classList.toggle("active");
    
    // Blocăm scroll-ul pe pagină când meniul e deschis
    if(navOverlay.classList.contains("active")) {
        document.body.style.overflow = "hidden";
    } else {
        document.body.style.overflow = "auto";
    }
});

// Închidem meniul automat când se dă click pe un link
document.querySelectorAll(".nav-menu a").forEach(n => n.addEventListener("click", () => {
    hamburger.classList.remove("active");
    navOverlay.classList.remove("active");
    document.body.style.overflow = "auto";
}));


// --- LOGICA INTELIGENTĂ DARK MODE ---
const btn = document.getElementById('themeToggleBtn');
const sunIcon = btn.querySelector('.sun-icon');
const moonIcon = btn.querySelector('.moon-icon');
const themeText = btn.querySelector('.theme-text');

function updateIcons(isDark) {
    if (isDark) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
        themeText.textContent = 'Mod Luminos';
    } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
        themeText.textContent = 'Mod Întunecat';
    }
}

function setTheme(isDark) {
    if (isDark) {
        document.documentElement.classList.add('dark-mode');
        localStorage.setItem('darkMode', 'enabled');
    } else {
        document.documentElement.classList.remove('dark-mode');
        localStorage.setItem('darkMode', 'disabled');
    }
    updateIcons(isDark);
}

const savedTheme = localStorage.getItem('darkMode');
const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');

if (savedTheme === 'enabled') {
    setTheme(true);
} else if (savedTheme === 'disabled') {
    setTheme(false);
} else {
    setTheme(prefersDarkScheme.matches);
}

btn.addEventListener('click', () => {
    const isCurrentlyDark = document.documentElement.classList.contains('dark-mode');
    setTheme(!isCurrentlyDark);
});

prefersDarkScheme.addEventListener('change', (e) => {
    if (!localStorage.getItem('darkMode')) {
        setTheme(e.matches);
    }
});
</script>

<script>
function changeColor(el, color){
    // Resetăm clasa active de pe toate butoanele
    document.querySelectorAll(".color-btn").forEach(b => {
        b.classList.remove("active");
    });
    el.classList.add("active");

    let img = document.getElementById("productImg");
    
    // Înlocuiește denumirile cu cele reale (de exemplu portmoneu1-maro.jpg) dacă ai poze diferite
    if(color === "black"){
        img.src = "../image/portmoneu1.jpg";
    }
    if(color === "brown"){ 
        img.src = "../image/portmoneu1.jpg";
    }
    if(color === "cognac"){
        img.src = "../image/portmoneu1.jpg";
    }
}

// Verifică starea temei la încărcarea paginii
if (localStorage.getItem('darkMode') === 'enabled') {
    document.documentElement.classList.add('dark-mode');
}
</script>
