<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portofel Classic - Zalmoxis Leather</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f3e7db;
color:#2a1c16;
}

/* ================= LAYOUT ================= */
.container{
max-width:1100px;
margin:100px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
padding:20px;
align-items:center;
}

.image-box img{
width:100%;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
transition:0.3s ease;
}

.image-box img:hover{
transform:scale(1.02);
}

/* TEXT */
h1{
font-size:38px;
margin:0;
}

.price{
font-size:24px;
margin:15px 0;
font-weight:700;
color:#5a3a2e;
}

.desc{
color:#5a3a2e;
line-height:1.6;
margin-top:10px;
}

/* ================= PREMIUM BUTTON SYSTEM ================= */

.btn{

display:inline-block;

padding:14px 28px;

border:1px solid #9A6A3A;

background:transparent;

color:#2A211B;

text-decoration:none;

transition:.35s;
}

.btn:hover{

background:#9A6A3A;

color:white;

transform:translateY(-2px);

}
/* active color button */
.color-btn.active{
background:#9A6A3A;
color:white;
border-color:#9A6A3A;
}

/* COLORS */
.colors{
margin-top:25px;
}

/* MOBILE */
@media(max-width:768px){
.container{
grid-template-columns:1fr;
text-align:center;
}
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="image-box">
<img id="productImg" src="https://images.unsplash.com/photo-1600180758890?auto=format&fit=crop&w=800&q=80" alt="Portofel Classic">
</div>

<!-- INFO -->
<div>

<h1>Portofel Classic</h1>

<div class="price">349 MDL</div>

<div class="desc">
Portofel realizat manual din piele naturală full-grain.
Cusut manual pentru durabilitate și design minimalist premium.
</div>

<!-- COLORS -->
<div class="colors">
<h3>Culori</h3>

<span class="color-btn active" onclick="changeColor(this,'black')">Negru</span>
<span class="color-btn" onclick="changeColor(this,'brown')">Maro</span>
<span class="color-btn" onclick="changeColor(this,'cognac')">Coniac</span>
</div>

<!-- ORDER BUTTON -->
<a class="btn"
href="https://ig.me/m/zalmoxis_leather?text=Salut!%20Vreau%20sa%20comand%20Portofel%20Classic"
target="_blank">
Comandă pe Instagram
</a>

</div>

</div>

<script>
function changeColor(el, color){

// active state
document.querySelectorAll(".color-btn").forEach(b=>{
b.classList.remove("active");
});
el.classList.add("active");

let img = document.getElementById("productImg");

if(color === "black"){
img.src = "https://images.unsplash.com/photo-1600180758890?auto=format&fit=crop&w=800&q=80";
}

if(color === "brown"){
img.src = "https://images.unsplash.com/photo-1618354691792-d1d42acfd860?auto=format&fit=crop&w=800&q=80";
}

if(color === "cognac"){
img.src = "https://images.unsplash.com/photo-1600180758890?auto=format&fit=crop&w=800&q=80";
}
}
</script>

</body>
</html>
