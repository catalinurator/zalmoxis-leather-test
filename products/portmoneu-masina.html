<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofel Mașină - Zalmoxis Leather</title>

    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3e7db;
            color: #2a1c16;
            transition: background 0.3s, color 0.3s; /* Tranziție fină la schimbarea temei */
        }

        /* --- STILURI PENTRU DARK MODE --- */
        html.dark-mode body {
            background: #121212;
            color: #e0e0e0;
        }

        html.dark-mode .price {
            color: #c49a6c;
        }

        html.dark-mode .desc {
            color: #b0a095;
        }

        html.dark-mode .color-btn {
            border-color: #c49a6c;
            color: #e0e0e0;
        }

        html.dark-mode .color-btn:hover {
            background: #c49a6c;
            color: #121212;
        }

        html.dark-mode .color-btn.active {
            background: #c49a6c;
            border-color: #c49a6c;
            color: #121212;
        }

        html.dark-mode .btn {
            border-color: #c49a6c;
            color: #e0e0e0;
        }

        html.dark-mode .btn:hover {
            background: #c49a6c;
            color: #121212;
        }
        /* -------------------------------- */

        .container {
            max-width: 1100px;
            margin: 100px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 20px;
            align-items: center;
        }

        /* IMAGE */
        .image-box img {
            width: 100%;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .image-box img:hover {
            transform: scale(1.02);
        }

        /* TEXT */
        h1 {
            font-size: 38px;
            margin: 0;
        }

        .price {
            font-size: 24px;
            margin: 15px 0;
            font-weight: 700;
            color: #5a3a2e;
        }

        .desc {
            color: #5a3a2e;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* COLORS */
        .colors {
            margin-top: 25px;
        }

        .colors h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .color-btn {
            display: inline-block;
            padding: 10px 16px;
            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: .35s;
            margin-right: 5px;
        }
         
        .color-btn:hover {
            background: #9A6A3A;
            color: white;
            transform: translateY(-2px);
        }

        .color-btn.active {
            background: #c49a6c;
            border-color: #c49a6c;
            color: #2a1c16;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 14px 36px;
            margin-top: 20px; 
            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            transition: .35s;
        }

        .btn:hover {
            background: #9A6A3A;
            color: white;
            transform: translateY(-2px);
        }

        /* MOBILE */
        @media(max-width:768px){
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="image-box">
        <img id="productImg" src="../image/portmoneu-masina-negru.jpg" alt="Portofel piele naturală">
    </div>

    <div>
        <h1>Portofel Mașină</h1>
        <div class="price">549 MDL</div>
        <div class="desc">
            Portofel realizat manual din piele naturală full-grain. Design minimalist, cusut manual pentru durabilitate maximă.
        </div>

        <div class="colors">
            <h3>Culori</h3>
            <button class="color-btn active" onclick="changeColor(this,'black')">Negru</button>
            <button class="color-btn" onclick="changeColor(this,'brown')">Maro</button>
            <button class="color-btn" onclick="changeColor(this,'cognac')">Coniac</button>
        </div>

        <a class="btn" href="https://ig.me/m/zalmoxis_leather?text=Salut!%20Vreau%20sa%20comand%20Portofel%20Masina" target="_blank">
            Comandă
        </a>
    </div>

</div>

<script>
function changeColor(el, color){
    // Resetăm clasa active de pe toate butoanele
    document.querySelectorAll(".color-btn").forEach(b => {
        b.classList.remove("active");
    });
    el.classList.add("active");

    let img = document.getElementById("productImg");
    
    if(color === "black"){
        img.src = "../image/portmoneu-masina-negru.jpg";
    }
    if(color === "brown"){ 
        img.src = "../image/portmomeu-masina-maro.jpg";
    }
    if(color === "cognac"){
        img.src = "../image/portmoneu-masina-cognac.jpg";
    }
}

// Verifică starea temei la încărcarea paginii
if (localStorage.getItem('darkMode') === 'enabled') {
    document.documentElement.classList.add('dark-mode');
}
</script>

</body>
</html>
