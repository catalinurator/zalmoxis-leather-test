<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#f3e7db;
color:#2a1c16;
}

.container{
max-width:1100px;
margin:100px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:20px;
}

/* IMAGE */
.image-box img{
width:100%;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* INFO */
h1{
font-size:34px;
margin-bottom:10px;
}

.price{
font-size:22px;
margin:10px 0;
font-weight:600;
}

.desc{
color:#5a3a2e;
line-height:1.5;
}

/* ========================= */
/* PREMIUM BUTTON SYSTEM */
/* ========================= */

.btn, .color-btn{
display:inline-block;
padding:12px 18px;
border-radius:12px;
border:1px solid rgba(154,106,58,0.6);
cursor:pointer;
transition:0.25s ease;
font-size:14px;
text-decoration:none;
color:#2A211B;
background:transparent;
letter-spacing:0.3px;
font-weight:500;
}

/* hover premium */
.btn:hover, .color-btn:hover{
background:#9A6A3A;
color:#fff;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(154,106,58,0.25);
}

/* active state pentru culori */
.color-btn.active{
background:#9A6A3A;
color:#fff;
border-color:#9A6A3A;
}

/* COLORS */
.colors{
margin-top:20px;
}

/* MOBILE */
@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}
</style>
