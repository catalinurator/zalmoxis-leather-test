<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colecții - Zalmoxis Leather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TOP BAR -->
    <div class="topbar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo">ZALMOXIS</div>
        <div id="theme-toggle" style="margin-left:auto; cursor:pointer; font-size:24px;">☀️</div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>ZALMOXIS</h2>
        <a href="index.html" onclick="toggleMenu()">Acasă</a>
        <a href="collections.html" onclick="toggleMenu()">Colecții</a>
        <a href="index.html#produse" onclick="toggleMenu()">Produse</a>
        <a href="index.html#atelier" onclick="toggleMenu()">Atelier</a>
        <a href="index.html#contact" onclick="toggleMenu()">Contact</a>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- HERO COLECȚII -->
    <section class="hero fade-in" style="height: 55vh; min-height: 420px;">
        <div class="hero-content">
            <h1>Colecțiile Zalmoxis</h1>
            <p>Piele naturală • Lucrată manual • Calitate premium</p>
        </div>
    </section>

    <!-- GRID COLECȚII -->
    <section class="fade-in" style="padding: 60px 20px;">
        <div class="grid">
            <!-- PORTOFELE -->
            <a class="card" href="index.html#produse">
                <img src="image/portmoneu1.jpg" alt="Portofele">
                <div class="info">
                    <h3>Portofele</h3>
                    <p>Minimaliste & elegante</p>
                </div>
            </a>

            <!-- CURELE -->
            <a class="card" href="products/curea-classic.html">
                <img src="image/curea1.png" alt="Curele">
                <div class="info">
                    <h3>Curele</h3>
                    <p>Handmade din piele naturală</p>
                </div>
            </a>

            <!-- GENȚI -->
            <a class="card" href="products/geanta-vintage.html">
                <img src="image/geanta1.jpg" alt="Genți">
                <div class="info">
                    <h3>Genți</h3>
                    <p>Design vintage premium</p>
                </div>
            </a>
        </div>
    </section>

    <script>
        function toggleMenu(){
            document.getElementById("sidebar").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("active");
        }

        // Dark Mode
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        function setTheme(isDark) {
            if (isDark) {
                html.classList.add('dark');
                themeToggle.textContent = '☽';
            } else {
                html.classList.remove('dark');
                themeToggle.textContent = '☀️';
            }
            localStorage.setItem('darkMode', isDark);
        }

        themeToggle.addEventListener('click', () => {
            setTheme(!html.classList.contains('dark'));
        });

        // Inițializare temă + scroll reveal
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('darkMode');
            if (saved !== null) {
                setTheme(saved === 'true');
            } else {
                setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
            }
        });
    </script>
</body>
</html>
