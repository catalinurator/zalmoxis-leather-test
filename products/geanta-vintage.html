<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geanta | Zalmoxis Leather</title>

    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3e7db;
            color: #2a1c16;
            transition: background 0.3s, color 0.3s; /* Tranziție fină când se schimbă tema */
        }

        /* --- REGULI PENTRU DARK MODE --- */
        html.dark-mode body {
            background: #121212; /* Fundal închis la culoare */
            color: #e0e0e0;      /* Text deschis la culoare */
        }

        html.dark-mode .price {
            color: #c49a6c;
        }

        html.dark-mode .desc {
            color: #b0a095;      /* Text descriere mai lizibil pe fundal negru */
        }

        html.dark-mode .btn {
            border-color: #c49a6c;
            color: #e0e0e0;
        }

        html.dark-mode .btn:hover {
            background: #c49a6c;
            color: #121212;
        }
        /* -------------------------------- */

        .container {
            max-width: 1100px;
            margin: 0 auto;
            margin-top: 100px !important; /* Spațiu adăugat pentru a nu intra sub header-ul fix */
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px 20px;
            align-items: center;
        }

        /* IMAGE */
        .image-box img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .image-box img:hover {
            transform: scale(1.02);
        }

        /* TEXT */
        h1 {
            font-size: 34px;
            margin: 0;
        }

        .price {
            font-size: 22px;
            font-weight: 600;
            margin: 10px 0;
        }

        .desc {
            color: #5a3a2e;
            line-height: 1.5;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 14px 28px;
            margin-top: 20px;
            border: 1px solid #9A6A3A;
            background: transparent;
            color: #2A211B;
            text-decoration: none;
            transition: .35s;
        }

        .btn:hover {
            background:#9A6A3A;
            color:white;
            transform:translateY(-2px);
        }

        /* --- HEADER FIXED --- */
        .main-header {
            background: #f3e7db; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            border-bottom: 1px solid rgba(42, 28, 22, 0.08); 
            transition: background 0.3s, border-color 0.3s;
        }

        html.dark-mode .main-header {
            background: #121212; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            color: #2a1c16; 
            letter-spacing: 3px;
            transition: color 0.3s;
        }
        html.dark-mode .logo { color: #e0e0e0; }

        /* HAMBURGER DISCRET */
        .hamburger {
            display: block;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 6px;
            z-index: 10002 !important; /* Se pune peste absolut tot */
        }

        .bar {
            display: block;
            width: 24px;
            height: 1.5px;
            margin: 5px auto;
            transition: all 0.3s ease-in-out;
            background-color: #2a1c16;
        }
        html.dark-mode .bar { background-color: #e0e0e0; }

        .hamburger.active .bar:nth-child(2) { opacity: 0; }
        .hamburger.active .bar:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .hamburger.active .bar:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

        /* --- OVERLAY UNIC PENTRU EVITAREA CONFLICTELOR DIN CSS-UL EXTERN --- */
        .zalmoxis-menu-overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100vh !important;
            background-color: #f3e7db !important;
            z-index: 10001 !important; /* Sub buton, dar peste site */
            
            /* Animare sigură */
            opacity: 0 !important;
            visibility: hidden !important;
            transform: translateY(-20px) !important;
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease !important;
            
            /* Centrare elemente */
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
        }

        html.dark-mode .zalmoxis-menu-overlay {
            background-color: #121212 !important;
        }

        .zalmoxis-menu-overlay.active {
            opacity: 1 !important;
            visibility: visible !important;
            transform: translateY(0) !important;
        }

        .zalmoxis-links-container {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 30px !important;
            width: 100% !important;
        }

        .zalmoxis-links-container a {
            text-decoration: none !important;
            color: #2a1c16 !important;
            font-size: 26px !important;
            font-weight: 500 !important;
            letter-spacing: 1px !important;
            transition: color 0.3s !important;
            display: block !important;
            text-align: center !important;
        }
        html.dark-mode .zalmoxis-links-container a { color: #e0e0e0 !important; }
        .zalmoxis-links-container a:hover { color: #9A6A3A !important; }

        .menu-spacer {
            height: 10px;
        }

        /* BUTONUL SCHIMBĂRE TEMĂ DIN INTERIORUL MENIULUI */
        .theme-toggle-inline {
            background: transparent !important;
            border: 1px solid rgba(154, 106, 58, 0.4) !important;
            padding: 12px 24px !important;
            border-radius: 25px !important;
            color: #5a3a2e !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 10px !important;
            font-family: inherit !important;
            font-size: 15px !important;
            transition: all 0.3s !important;
        }

        html.dark-mode .theme-toggle-inline {
            border-color: rgba(196, 154, 108, 0.4) !important;
            color: #b0a095 !important;
        }

        /* MOBILE */
        @media(max-width:768px){
            .container {
                grid-template-columns: 1fr;
                text-align: center;
                margin-top: 70px !important; /* Margine optimizată pentru ecrane mici */
                padding-top: 20px;
            }
            .zalmoxis-links-container a {
                font-size: 24px !important;
            }
        }
    </style>
</head>

<body>

<!-- HEADER DISCRET ȘI FIX -->
<header class="main-header">
    <div class="header-container">
        <a href="../index.html" class="logo">ZALMOXIS</a>
        
        <button class="hamburger" aria-label="Deschide meniul">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </div>
</header>

<!-- MENIUL OVERLAY CU CLASE UNICE -->
<div class="zalmoxis-menu-overlay">
    <nav class="zalmoxis-links-container">
        <a href="../index.html">Acasă</a>
        <a href="../index.html#produse">Produse</a>
        <a href="../index.html#despre">Despre Noi</a>
        <a href="../index.html#contact">Contact</a>
        
        <div class="menu-spacer"></div>

        <button id="themeToggleBtn" class="theme-toggle-inline" aria-label="Schimbă tema">
            <span class="theme-text">Mod Întunecat</span>
            <span class="theme-icons">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none; width:18px; height:18px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.344l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                </svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px; height:18px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </span>
        </button>
    </nav>
</div>

<!-- CONȚINUT PAGINĂ PRODUS -->
<div class="container">

    <div class="image-box">
        <img id="productImg" src="../image/geanta1.jpg" alt="Geanta din piele naturală">
    </div>

    <div>
        <h1>Geanta </h1>
        <div class="price">1899 MDL</div>

        <div class="desc">
            Geanta din piele naturală, lucrată manual pentru rezistență.
        </div>

        <a class="btn" href="https://ig.me/m/zalmoxis_leather?text=Salut!%20Vreau%20sa%20comand%20geanta" target="_blank">
            Comandă
        </a>
    </div>

</div>

<!-- SCRIPTURI LOGICE PENTRU INTERACȚIUNE -->
<script>
// 1. Logica meniului Hamburger
const hamburger = document.querySelector(".hamburger");
const navOverlay = document.querySelector(".zalmoxis-menu-overlay");

hamburger.addEventListener("click", () => {
    hamburger.classList.toggle("active");
    navOverlay.classList.toggle("active");
    
    if(navOverlay.classList.contains("active")) {
        document.body.style.overflow = "hidden";
    } else {
        document.body.style.overflow = "auto";
    }
});

document.querySelectorAll(".zalmoxis-links-container a").forEach(n => n.addEventListener("click", () => {
    hamburger.classList.remove("active");
    navOverlay.classList.remove("active");
    document.body.style.overflow = "auto";
}));

// Închidere la click în afara meniului (inclusiv în părțile laterale stânga/dreapta ca în image_7ccca6.png)
navOverlay.addEventListener("click", (e) => {
    const aFostPeLinkSauButon = e.target.closest(".zalmoxis-links-container a") || e.target.closest("#themeToggleBtn");
    
    if (!aFostPeLinkSauButon) {
        hamburger.classList.remove("active");
        navOverlay.classList.remove("active");
        document.body.style.overflow = "auto";
    }
});

// 2. Logica Dark Mode completă
const btn = document.getElementById('themeToggleBtn');
const sunIcon = btn.querySelector('.sun-icon');
const moonIcon = btn.querySelector('.moon-icon');
const themeText = btn.querySelector('.theme-text');

function updateIcons(isDark) {
    if (isDark) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
        themeText.textContent = 'Mod Luminos';
    } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
        themeText.textContent = 'Mod Întunecat';
    }
}

function setTheme(isDark) {
    if (isDark) {
        document.documentElement.classList.add('dark-mode');
        localStorage.setItem('darkMode', 'enabled');
    } else {
        document.documentElement.classList.remove('dark-mode');
        localStorage.setItem('darkMode', 'disabled');
    }
    updateIcons(isDark);
}

const savedTheme = localStorage.getItem('darkMode');
const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');

if (savedTheme === 'enabled') {
    setTheme(true);
} else if (savedTheme === 'disabled') {
    setTheme(false);
} else {
    setTheme(prefersDarkScheme.matches);
}

btn.addEventListener('click', () => {
    const isCurrentlyDark = document.documentElement.classList.contains('dark-mode');
    setTheme(!isCurrentlyDark);
});
</script>

</body>
</html>
